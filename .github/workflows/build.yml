name: Build Unsigned IPA

# 手动触发 + push 到 main 分支时自动触发
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14   # GitHub 提供的云端 Mac 环境，免费额度内可用

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 显示可用的 Xcode 版本
        run: xcodebuild -version

      - name: 编译 Archive（不签名）
        run: |
          cd DreamHouse
          xcodebuild -project DreamHouse.xcodeproj \
            -scheme DreamHouse \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build/DreamHouse.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: 从 Archive 提取 .app 并打包成未签名 ipa
        run: |
          mkdir -p $GITHUB_WORKSPACE/build/Payload
          cp -r $GITHUB_WORKSPACE/build/DreamHouse.xcarchive/Products/Applications/DreamHouse.app $GITHUB_WORKSPACE/build/Payload/
          cd $GITHUB_WORKSPACE/build
          zip -r DreamHouse-unsigned.ipa Payload

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: DreamHouse-unsigned-ipa
          path: build/DreamHouse-unsigned.ipa
          retention-days: 14
